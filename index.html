<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>노래책 🎵</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#FFF8F6',
            card: '#FFF0ED',
            point: '#E8A0A0',
            accent: '#D4727A',
            txt: '#3D3D3D',
            sub: '#8C8C8C',
            thead: '#F5D5D5',
            starOn: '#E87A7A',
            starOff: '#E0D6D6',
          },
          fontFamily: {
            sans: ['Pretendard', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-bg min-h-screen font-sans">
  <!-- QP Navbar -->
  <nav class="sticky top-0 z-[60] bg-bg/95 backdrop-blur-sm border-b border-point/20" style="font-family:Pretendard,sans-serif">
    <div class="max-w-4xl mx-auto flex items-center justify-center">
      <a href="https://qpmain.pages.dev/" style="position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:#8C8C8C;text-decoration:none;transition:color .25s">프로필</a>
      <a href="https://qpmain.pages.dev/schedule/" style="position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:#8C8C8C;text-decoration:none;transition:color .25s">일정</a>
      <a href="https://qpsong.pages.dev/" style="position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:#D4727A;text-decoration:none;transition:color .25s;border-bottom:2px solid #D4727A">노래책</a>
      <a href="https://docs.google.com/spreadsheets/d/1s8W28tCubobvUJpWrqBweR5AEsUPaJP9-HZquMvk0JU/edit?gid=57272350#gid=57272350" target="_blank" style="position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:#8C8C8C;text-decoration:none;transition:color .25s">업보</a>
    </div>
  </nav>

  <!-- Header -->
  <header class="pt-10 pb-6 text-center">
    <h1 class="text-3xl md:text-4xl font-bold text-txt">
      🎵 <span class="font-poppins">노래책</span>
    </h1>
    <p class="text-sub mt-2 text-sm md:text-base">노래 목록을 확인하고 신청해보세요!</p>
  </header>

  <!-- Banner Section -->
  <main class="max-w-4xl mx-auto px-4 pb-16 space-y-3">

    <!-- Kpop Banner -->
    <a href="kpop.html" class="banner-card block relative overflow-hidden rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 group">
      <div class="banner-img-wrapper aspect-[16/4] md:aspect-[16/3] w-full overflow-hidden">
        <img src="assets/images/kpop-banner.png" alt="Kpop" 
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
      </div>
      <div class="absolute inset-0 bg-gradient-to-r from-black/40 via-black/20 to-transparent flex items-center pl-8 md:pl-12">
        <div>
          <span class="font-poppins text-3xl md:text-5xl font-bold text-white drop-shadow-lg">Kpop</span>
          <p class="text-white/80 text-sm md:text-base mt-1 drop-shadow">🎀 케이팝 노래 모음</p>
        </div>
      </div>
    </a>



    <!-- Jpop Banner -->
    <a href="jpop.html" class="banner-card block relative overflow-hidden rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 group">
      <div class="banner-img-wrapper aspect-[16/4] md:aspect-[16/3] w-full overflow-hidden">
        <img src="assets/images/jpop-banner.png" alt="Jpop"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
      </div>
      <div class="absolute inset-0 bg-gradient-to-r from-black/40 via-black/20 to-transparent flex items-center pl-8 md:pl-12">
        <div>
          <span class="font-poppins text-3xl md:text-5xl font-bold text-white drop-shadow-lg">Jpop</span>
          <p class="text-white/80 text-sm md:text-base mt-1 drop-shadow">🌸 제이팝 노래 모음</p>
        </div>
      </div>
    </a>

    <!-- Pop Banner -->
    <a href="pop.html" class="banner-card block relative overflow-hidden rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 group">
      <div class="banner-img-wrapper aspect-[16/4] md:aspect-[16/3] w-full overflow-hidden">
        <img src="assets/images/pop-banner.png" alt="Pop"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
      </div>
      <div class="absolute inset-0 bg-gradient-to-r from-black/40 via-black/20 to-transparent flex items-center pl-8 md:pl-12">
        <div>
          <span class="font-poppins text-3xl md:text-5xl font-bold text-white drop-shadow-lg">Pop</span>
          <p class="text-white/80 text-sm md:text-base mt-1 drop-shadow">🎶 팝 노래 모음</p>
        </div>
      </div>
    </a>

        <!-- Aegyo Banner -->
    <a href="aegyo.html" class="banner-card block relative overflow-hidden rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 group">
      <div class="banner-img-wrapper aspect-[16/4] md:aspect-[16/3] w-full overflow-hidden">
        <img src="assets/images/aegyo-banner.png" alt="애교송"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
      </div>
      <div class="absolute inset-0 bg-gradient-to-r from-black/40 via-black/20 to-transparent flex items-center pl-8 md:pl-12">
        <div>
          <span class="font-poppins text-3xl md:text-5xl font-bold text-white drop-shadow-lg">애교송</span>
          <p class="text-white/80 text-sm md:text-base mt-1 drop-shadow">💕 애교송 모음</p>
        </div>
      </div>
    </a>

  </main>

  <!-- Footer -->
  <footer class="text-center py-6 text-sub text-xs">
    <p>© 2026 QP 💖</p>
  </footer>

</body>
</html>
