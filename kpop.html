<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>🎀 Kpop - 노래책 🎵</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#FFF8F6', card: '#FFF0ED', point: '#E8A0A0', accent: '#D4727A',
            txt: '#3D3D3D', sub: '#8C8C8C', thead: '#F5D5D5', starOn: '#E87A7A', starOff: '#E0D6D6',
          },
          fontFamily: { sans: ['Pretendard', 'sans-serif'], poppins: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-bg min-h-screen font-sans">
  <!-- QP Navbar -->
  <nav class="sticky top-0 z-[60] bg-bg/95 backdrop-blur-sm border-b border-point/20" style="font-family:Pretendard,sans-serif">
    <div class="max-w-4xl mx-auto flex items-center justify-center">
      <a href="https://qpmain.pages.dev/" style="position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:#8C8C8C;text-decoration:none;transition:color .25s">프로필</a>
      <a href="https://qpmain.pages.dev/schedule/" style="position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:#8C8C8C;text-decoration:none;transition:color .25s">일정</a>
      <a href="https://qpsong.pages.dev/" style="position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:#D4727A;text-decoration:none;transition:color .25s;border-bottom:2px solid #D4727A">노래책</a>
      <a href="#" style="position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:#8C8C8C;text-decoration:none;transition:color .25s">업보</a>
    </div>
  </nav>

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-bg/95 backdrop-blur-sm border-b border-point/20">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center gap-3">
      <a href="index.html" class="text-accent hover:text-accent/70 transition-colors text-lg">←</a>
      <h1 class="text-xl md:text-2xl font-bold text-txt">
        🎀 <span class="font-poppins">Kpop</span>
      </h1>
    </div>
  </header>

  <!-- Song Table -->
  <main class="max-w-4xl mx-auto px-4 py-6">
    <!-- Signature Section -->
    <div id="signatureSection" class="hidden mb-6"></div>

    <!-- Search -->
    <div class="mb-4">
      <input type="text" id="searchInput" placeholder="🔍 가수 또는 제목 검색..."
             class="w-full md:w-80 px-4 py-2.5 rounded-xl border border-point/30 bg-white 
                    focus:outline-none focus:ring-2 focus:ring-accent/30 text-sm text-txt
                    placeholder:text-sub/60">
    </div>

    <!-- Table -->
    <div class="overflow-x-auto rounded-xl shadow-sm border border-point/20">
      <table class="w-full text-sm">
        <thead class="bg-thead">
          <tr>
            <th class="text-left px-4 py-3 font-semibold text-txt w-[22%]">가수</th>
            <th class="text-left px-4 py-3 font-semibold text-txt w-[28%]">제목</th>
            <th class="text-center px-4 py-3 font-semibold text-txt w-[18%]">숙련도</th>
            <th class="text-left px-4 py-3 font-semibold text-txt w-[22%]">메모</th>
            <th class="text-center px-4 py-3 font-semibold text-txt w-[10%]">복사</th>
          </tr>
        </thead>
        <tbody id="songTableBody">
          <!-- JS에서 동적 렌더링 -->
        </tbody>
      </table>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-16">
      <p class="text-sub text-lg">🎵 등록된 노래가 없습니다</p>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="text-center py-16">
      <div class="inline-block w-8 h-8 border-3 border-point border-t-transparent rounded-full animate-spin"></div>
      <p class="text-sub mt-3 text-sm">노래 목록을 불러오는 중...</p>
    </div>
  </main>

  <footer class="text-center py-6 text-sub text-xs">
    <p>© 2026 QP 💖</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/songs.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => loadSongs('kpop'));
  </script>
</body>
</html>
